name: linkcheck

on:
  workflow_dispatch:
  push:
  schedule:
  - cron: '30 1 * * *' # daily at 01:30 UTC

jobs:
  external-link-check:
    runs-on: ubuntu-latest

    steps:
    - name: Cloning repository
      uses: actions/checkout@v6

    - name: Lychee Link Checker
      uses: lycheeverse/lychee-action@master  # to be remplaced with a fixed version once --accept-timeouts got released
      with:
        args: --accept-timeouts --accept 200,401,403,429,500 -c lychee.toml --no-progress --root-dir ${{ github.workspace }} .
